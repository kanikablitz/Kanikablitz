<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark Tech Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e12" />
      <stop offset="100%" stop-color="#1b1d26" />
    </linearGradient>
    <!-- Neon Lightning Flash Pink/Purple Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <!-- Soft Glow Filter Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Tech Base Shape -->
  <polygon points="256,16 464,120 464,392 256,496 48,392 48,120" fill="url(#bgGrad)" stroke="url(#neonGrad)" stroke-width="12" rx="15" />
  
  <!-- Subtle Internal Cyber Grid Line -->
  <polygon points="256,40 432,130 432,382 256,472 80,382 80,130" fill="none" stroke="#374151" stroke-width="4" stroke-dasharray="10,10" />

  <!-- Stylized "KB" Lightning Bolt Core with High Glow -->
  <g filter="url(#glow)">
    <path d="M210,110 L310,110 L250,230 L330,230 L190,410 L230,270 L170,270 Z" fill="url(#neonGrad)" />
  </g>
</svg>
